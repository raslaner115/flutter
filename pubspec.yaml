name: untitled1
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0


dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  image_picker: ^1.2.1
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  firebase_database: ^12.1.3
  firebase_storage: ^13.1.0
  firebase_app_check: ^0.4.1+5
  url_launcher: ^6.3.1
  share_plus: ^12.0.1
  pay: ^3.3.0
  http: ^1.1.0
  in_app_purchase: ^3.2.3
  webview_flutter: ^4.13.1
  shared_preferences: ^2.5.4
  google_sign_in: ^7.2.0
  flutter_facebook_auth: ^7.1.1
  sign_in_with_apple: ^6.1.1
  cloud_firestore: ^6.1.3
  table_calendar: ^3.1.2
  geolocator: ^14.0.2
  firebase_messaging: ^16.1.2
  flutter_local_notifications: ^21.0.0
  permission_handler: ^12.0.1
  geocoding: ^4.0.0
  printing: ^5.14.3
  pdf: ^3.12.0
  intl: ^0.20.2


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#0f172a"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter_native_splash:
  color: "#0f172a"
  android_12:
    color: "#0f172a"

flutter:
  uses-material-design: true
  assets:
    - assets/cities.json
    - assets/profeissions.json
    - assets/apple_pay_config.json
    - assets/google_pay_config.json
    - assets/icon/
    - assets/fonts/

  fonts:
    - family: Rubik
      fonts:
        - asset: assets/fonts/Rubik-Italic-VariableFont_wght.ttf
        - asset: assets/fonts/Rubik-VariableFont_wght.ttf
          weight: 700
